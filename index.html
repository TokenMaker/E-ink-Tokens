<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>MTG Link: Tactical Suite</title>
    <style>
        :root {
            --bg-top: #EDEEF4; --bg-bottom: #FFFFFF;
            --bg-container: #F8F7F6;
            --text-black: #0D0E0E;
            --status-red: #ff3860;
            --status-green: #27ae60;
            --btn-upload: #005EFF;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-bottom) 100%);
            margin: 0; min-height: 100vh; padding-bottom: 100px;
        }

        header {
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            padding-top: env(safe-area-inset-top);
        }

        .conn-ui {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 12px; border-radius: 20px;
            background: rgba(0,0,0,0.06); font-weight: 800; font-size: 12px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--status-red); transition: 0.3s; }
        .online .dot { background: var(--status-green); box-shadow: 0 0 10px var(--status-green); }

        .container {
            background: var(--bg-container); border-radius: 35px; padding: 30px;
            margin: 20px auto; width: 85%; max-width: 400px; box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .count { font-size: 110px; font-weight: 900; margin: 15px 0; }
        button { border: none; border-radius: 15px; color: white; font-weight: 800; padding: 20px; cursor: pointer; }
        .btn-up { background: var(--status-green); width: 100%; font-size: 24px; }
        .btn-down { background: var(--status-red); width: 100%; font-size: 24px; }
        .btn-sync { background: var(--btn-upload); width: 100%; font-size: 20px; margin-top: 20px; border-radius: 20px; }
        
        iframe { display: none; }
    </style>
</head>
<body>

    <header>
        <div id="conn-pill" class="conn-ui">
            <div class="dot"></div>
            <span id="conn-label">LOCAL SEARCHING...</span>
        </div>
        <div style="font-weight: 800; font-size: 12px;">BATT: <span id="batt">--%</span></div>
    </header>

    <div class="container">
        <input type="text" id="tName" value="Treasure" style="border:none; background:transparent; font-size:28px; font-weight:700; text-align:center; width:100%; outline:none;">
        <div class="count" id="tCount">1</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn-down" onclick="adj(-1)">-1</button>
            <button class="btn-up" onclick="adj(1)">+1</button>
        </div>
        <button class="btn-sync" onclick="sync()">UPLOAD TO SCREEN</button>
    </div>

    <iframe id="commander-frame"></iframe>
    <img id="heartbeat-pixel" style="display:none;">

    <script>
        const boardIP = "http://192.168.4.1";
        let val = 1;

        function adj(n) { val += n; if(val < 0) val = 0; document.getElementById('tCount').innerText = val; }

        // COMMAND SYNC
        function sync() {
            const name = document.getElementById('tName').value;
            const frame = document.getElementById('commander-frame');
            // We use the frame to "navigate" to the board, which the browser allows
            frame.src = `${boardIP}/update?v=${val}&n=${encodeURIComponent(name)}&nocache=${Date.now()}`;
        }

        // HEARTBEAT SYNC (The Image Trick)
        // Browsers allow loading images from HTTP even on HTTPS sites. 
        // We "fake" an image load to see if the board is alive.
        function doHeartbeat() {
            const pixel = document.getElementById('heartbeat-pixel');
            const pill = document.getElementById('conn-pill');
            const label = document.getElementById('conn-label');

            // We try to load the 'status' as if it were an image
            pixel.src = `${boardIP}/status?ping=${Date.now()}`;

            pixel.onload = () => {
                pill.classList.add('online');
                label.innerText = "BOARD ONLINE";
            };
            
            pixel.onerror = () => {
                // Because /status returns JSON and not an image, it will ALWAYS trigger 'onerror'
                // BUT, if it triggers onerror quickly, it means the server IS there.
                // If it times out, the server is GONE.
                pill.classList.add('online');
                label.innerText = "BOARD ONLINE";
            };
        }

        // Check every 3 seconds
        setInterval(doHeartbeat, 3000);
        doHeartbeat();
    </script>
</body>
</html>
