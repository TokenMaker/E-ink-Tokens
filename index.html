<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MTG Link">
    
    <title>MTG Link: Tactical Suite</title>
    <style>
        :root {
            --bg-top: #EDEEF4; --bg-bottom: #FFFFFF;
            --bg-container: #F8F7F6;
            --text-black: #0D0E0E;
            --btn-upload: #005EFF;
            --btn-plus: #12B25A;
            --btn-minus: #EF5A3F;
            --status-red: #ff3860;
            --status-green: #27ae60;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-bottom) 100%);
            margin: 0; min-height: 100vh; padding-bottom: 100px;
        }

        header {
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; font-weight: 700;
            padding-top: env(safe-area-inset-top); 
        }

        /* The Connection Indicator */
        .conn-status {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 10px; border-radius: 20px;
            background: rgba(0,0,0,0.05); transition: all 0.3s;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--status-red); }
        .online .dot { background: var(--status-green); box-shadow: 0 0 8px var(--status-green); }

        .container {
            background: var(--bg-container); border-radius: 40px; padding: 25px;
            margin: 15px auto; width: 85%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.04);
        }

        .token-name { width: 100%; border: none; background: transparent; text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 10px; outline: none; }
        .count-display { font-size: 100px; font-weight: 900; text-align: center; margin: 10px 0; }
        
        button { border: none; border-radius: 14px; color: white; font-weight: 800; cursor: pointer; padding: 15px; }
        .btn-plus { background: var(--btn-plus); width: 100%; font-size: 24px; }
        .btn-minus { background: var(--btn-minus); width: 100%; font-size: 24px; }
        .btn-upload { background: var(--btn-upload); width: 100%; font-size: 20px; margin-top: 15px; border-radius: 20px; }

        #sync-iframe { display: none; }
    </style>
</head>
<body>

    <header>
        <div id="connection-ui" class="conn-status">
            <div class="dot"></div>
            <span id="conn-text">DISCONNECTED</span>
        </div>
        <div>BATT: <span id="batt-val">--%</span></div>
    </header>

    <div class="container">
        <input class="token-name" id="tName" value="Treasure">
        <div class="count-display" id="tCount">1</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-minus" onclick="updateLocal(-1)">-1</button>
            <button class="btn-plus" onclick="updateLocal(1)">+1</button>
        </div>
        <button class="btn-upload" onclick="sendToBoard()">UPLOAD TO BOARD</button>
    </div>

    <iframe id="sync-iframe"></iframe>

    <script>
        const boardIP = "http://192.168.4.1";
        let count = 1;

        function updateLocal(val) {
            count += val;
            if (count < 0) count = 0;
            document.getElementById('tCount').innerText = count;
        }

        // The "Nuclear Option" Sync via Iframe
        function sendToBoard() {
            const name = document.getElementById('tName').value;
            const iframe = document.getElementById('sync-iframe');
            const url = `${boardIP}/update?v=${count}&n=${encodeURIComponent(name)}&ts=${Date.now()}`;
            iframe.src = url;
            console.log("Sent via iframe:", url);
        }

        // Heartbeat Check: Tries to reach the board every 5 seconds
        async function checkConnection() {
            const statusUi = document.getElementById('connection-ui');
            const statusText = document.getElementById('conn-text');
            const battText = document.getElementById('batt-val');

            try {
                // Using a very short timeout so the UI feels snappy
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);

                const response = await fetch(`${boardIP}/status`, { 
                    mode: 'cors', 
                    signal: controller.signal 
                });
                
                const data = await response.json();
                clearTimeout(timeoutId);

                statusUi.classList.add('online');
                statusText.innerText = "CONNECTED";
                battText.innerText = data.battery + "%";
            } catch (e) {
                statusUi.classList.remove('online');
                statusText.innerText = "DISCONNECTED";
                battText.innerText = "--%";
            }
        }

        // Run check every 5 seconds
        setInterval(checkConnection, 5000);
        checkConnection(); // Run once on load
    </script>
</body>
</html>
